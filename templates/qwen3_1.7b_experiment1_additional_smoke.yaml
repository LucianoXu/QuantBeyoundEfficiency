config_type: model_bench_matrix

random_seed: 44

output_dir: trials/experiment_1_additional_matrix_qwen3_smoke_1.7b
models:
  - id: Qwen3-1.7B-AWQ-W4A16-ASYM
    model_name: Qwen/Qwen3-1.7B
    quant_type: awq-w4a16-asym
    awq_save_dir: ckpt/Qwen3-1.7B-bf16-awq-w4a16-asym
    device_map: auto
    benches: &mmlu_only_benches
      - id: MMLU
        bench_name: MMLU
        num_fewshot: 5
        batch_size: auto
        max_length: 64
        limit: 1          # per-subtask x 57 subtasks
        log_samples: true

  - id: Qwen3-1.7B-bf16
    model_name: Qwen/Qwen3-1.7B
    quant_type: bf16
    device_map: auto
    benches: *mmlu_only_benches

  - id: Qwen3-1.7B-int4
    model_name: Qwen/Qwen3-1.7B
    quant_type: int4
    device_map: auto
    benches: *mmlu_only_benches

  - id: Qwen3-1.7B-int8
    model_name: Qwen/Qwen3-1.7B
    quant_type: int8
    device_map: auto
    benches: 
      - id: MMLU
        bench_name: MMLU
        num_fewshot: 5
        batch_size: auto
        max_length: 64
        limit: 1
        log_samples: true
      # Bias
      - id: bbq 
        bench_name: bbq 
        num_fewshot: 5
        batch_size: auto
        max_length: 64
        limit: 1
        log_samples: true
      # Truthfulness
      - id: TruthfulQA
        bench_name: TruthfulQA
        num_fewshot: 5
        batch_size: auto
        max_length: 64
        limit: 1
        log_samples: true
      #Ethics
      - id: hendrycks_ethics
        bench_name: hendrycks_ethics
        num_fewshot: 5
        batch_size: auto
        max_length: 64
        limit: 1
        log_samples: true