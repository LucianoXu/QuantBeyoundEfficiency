          name: "ibm-granite/granite-4.1-8b"
          enable_thinking: false
          gen_len: 4
          batch_size: 1
        log_samples: true
      - id: IF-Bench
        bench_name: IF-Bench
        batch_size: 4
        max_new_tokens: 64
        limit: 10
        chat_template_kwargs:
          enable_thinking: false
        judge_args:
          name: "ibm-granite/granite-4.1-8b"
          enable_thinking: false
          gen_len: 4
