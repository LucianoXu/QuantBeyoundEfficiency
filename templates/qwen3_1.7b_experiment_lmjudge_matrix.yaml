config_type: model_bench_matrix

random_seed: 44

output_dir: trials/experiment_lmjudge_alignment_utility_matrix_qwen3_1.7b
models:
  - id: Qwen3-4B-AWQ-W4A16-ASYM
    model_name: Qwen/Qwen3-4B
    quant_type: awq-w4a16-asym
    device_map: auto
    benches: &judge_benches
      - id: WILD-Bench
        bench_name: WILD-Bench
        batch_size: 4
        max_new_tokens: 64
        limit: 10
