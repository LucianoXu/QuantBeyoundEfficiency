config_type: attack

random_seed: 0
output_dir: trials/adv_diff_qwen3_4b_v3


objective: differential


model:
  model_name: Qwen/Qwen3-4B
  quant_type: bf16
  device_map: auto

quant_eval:
  model_name: Qwen/Qwen3-4B
  quant_type: int4
  device_map: auto

attack:
  l_suf: 20
  n_train: 24
  n_test: 64
  sample_seed: 0
  init_token: "!"

  optimizer: gcg
  num_steps: 500
  topk: 256
  batch_size: 512
  chunk: 256
  patience: null
  check_every: 10
  save_every: 25            # snapshot current suffix + trajectory to output_dir every N steps
  curriculum_loss: 0.5
  curriculum_patience: 25

  lam_refuse: 1.0
  a_margin: 0.5
  b_margin: 2.0

eval:
  gen_max_new_tokens: 256
  eval_batch_size: 32
